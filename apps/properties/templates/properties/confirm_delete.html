{% extends 'base.html' %}

{% block title %}Eliminar propiedad — InmueblesP Y{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:500px;">
  <div class="card p-4 text-center">
    <div style="font-size:3rem;margin-bottom:1rem;">⚠️</div>
    <h4 class="fw-bold">¿Eliminar esta propiedad?</h4>
    <p class="text-muted">Estás por eliminar <strong>{{ property.title }}</strong>. Esta acción no se puede deshacer.</p>
    <form method="POST">
      {% csrf_token %}
      <div class="d-flex gap-2 justify-content-center mt-3">
        <a href="{% url 'properties:my_properties' %}" class="btn btn-outline-secondary">Cancelar</a>
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
