{% extends 'base.html' %}

{% block title %}Contactar vendedor{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm p-4">
            <h1 class="mb-3">Contactar vendedor</h1>

            <p><strong>Propiedad:</strong> {{ propiedad.titulo }}</p>
            <p><strong>Precio:</strong> USD {{ propiedad.precio }}</p>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success">Enviar mensaje</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
